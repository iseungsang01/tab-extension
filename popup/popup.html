<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tab Finder</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app-shell">
    <header class="header">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">
          <img src="../icons/icon48.png" alt="">
        </span>
        <div class="brand-copy">
          <h1>Tab Finder</h1>
          <span data-i18n="subtitle">논문·문서 탭 빠른 검색</span>
        </div>
      </div>
      <div id="headerStats" class="header-stats" aria-live="polite">탭 0 · 즐겨찾기 0</div>
    </header>

    <main class="popup-main">
      <section class="search-section" aria-label="탭 검색" data-i18n-aria-label="searchSectionLabel">
        <div class="search-wrap">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <circle cx="11" cy="11" r="8"></circle>
            <path d="m21 21-4.3-4.3"></path>
          </svg>
          <input id="searchInput" type="search" autocomplete="off" spellcheck="false" placeholder="제목·자동 제목·메모 검색" aria-label="탭 검색" data-i18n-placeholder="searchPlaceholder" data-i18n-aria-label="searchSectionLabel">
          <button id="clearBtn" class="clear-btn" type="button" aria-label="검색어 지우기" data-i18n-aria-label="clearSearch">×</button>
        </div>
      </section>

      <section class="filters" aria-label="검색 범위" data-i18n-aria-label="scopeSearchLabel">
        <div class="scope-toggle" role="group" aria-label="검색 범위" data-i18n-aria-label="scopeSearchLabel">
          <button type="button" id="scopeCurrent" class="scope-btn active" data-scope="current-window"><span data-i18n="currentWindow">현재 창</span></button>
          <button type="button" id="scopeAll" class="scope-btn" data-scope="all-windows"><span data-i18n="allWindows">모든 창</span></button>
        </div>
        <label class="language-field" for="languageSelect">
          <span data-i18n="languageLabel">언어</span>
          <select id="languageSelect" aria-label="언어 선택" data-i18n-aria-label="languageSelect">
            <option value="ko" data-i18n="languageKorean">한국어</option>
            <option value="en" data-i18n="languageEnglish">English</option>
          </select>
        </label>
      </section>

      <section class="tabs-row" aria-label="결과 요약" data-i18n-aria-label="resultsSummaryLabel">
        <button type="button" id="modeSearch" class="mode-tab active" data-view-mode="search" aria-pressed="true"><span data-i18n="modeSearch">검색</span> <span id="resultCount" class="count">0건</span></button>
        <button type="button" id="modeFavorites" class="mode-tab" data-view-mode="favorites" aria-pressed="false"><span data-i18n="modeFavorites">즐겨찾기</span> <span id="favoriteCount" class="count favorite-count">0</span></button>
        <span id="scopeLabel" class="scope-label">현재 창</span>
      </section>

      <div id="emptyState" class="empty-state" hidden>
        <strong data-i18n="emptySearchTitle">결과 없음</strong>
        <span data-i18n="emptySearchDefault">다른 검색어를 입력하세요.</span>
      </div>

      <div id="results" class="results" role="listbox" aria-label="검색 결과" data-i18n-aria-label="searchResultsLabel"></div>

      <section class="bulk-actions" aria-label="전체 초기화" data-i18n-aria-label="bulkResetLabel">
        <span id="bulkResetStatus" class="bulk-reset-status" aria-live="polite"></span>
        <div class="bulk-reset-buttons">
          <button id="resetAllTitlesBtn" class="bulk-reset-btn" type="button" title="현재 검색 범위의 수동 제목만 지우고 자동 제목은 유지" data-i18n="bulkResetAllTitles" data-i18n-title="bulkResetAllTitlesTitle">전체 제목 초기화</button>
          <button id="resetAllMemosBtn" class="bulk-reset-btn danger" type="button" title="현재 검색 범위의 모든 메모 지우기" data-i18n="bulkResetAllMemos" data-i18n-title="bulkResetAllMemosTitle">전체 메모 초기화</button>
        </div>
      </section>
    </main>
  </div>

  <script src="../lib/tab_search.js"></script>
  <script src="popup.js"></script>
</body>
</html>
